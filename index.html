<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Fakty o vode</title>

<style>
:root {
  --primary: #444;
  --secondary: #6EC6E8;
  --background: #F7FAFC;
  --card: #FFFFFF;
  --text: #333333;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--background);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.widget {
  width: 420px;
  background: var(--card);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  text-align: center;
  border-left: 6px solid var(--secondary);
}

.category {
  font-size: 14px;
  color: var(--secondary);
  font-weight: bold;
  margin-bottom: 10px;
}

.icon {
  font-size: 40px;
  margin-bottom: 10px;
}

.text {
  font-size: 16px;
  line-height: 1.5;
  margin-top: 10px;
}

.fade {
  opacity: 0;
  transition: opacity 0.4s ease;
}
</style>
</head>

<body>

<div class="widget">
  <div class="category" id="category"></div>
  <div class="icon" id="icon"></div>
  <div class="text" id="text"></div>
</div>

<script>
// ✅ DÁTA (opravené a zjednotené)
const facts = [
  {
    id: 1,
    category: "Minerálna voda",
    icon: "💧",
    text: "Prírodná minerálna voda pochádza z podzemného zdroja, ktorý je chránený pred znečistením."
  },
  {
    id: 2,
    category: "Minerálna voda",
    icon: "💧",
    text: "Minerálne látky vo vode sa do nej dostávajú prirodzeným kontaktom s horninami."
  },
  {
    id: 3,
    category: "Minerálna voda",
    icon: "💧",
    text: "Nie každá balená voda je minerálna voda."
  },
  {
    id: 4,
    category: "Minerálna voda",
    icon: "💧",
    text: "Zloženie minerálnej vody musí zostať prirodzene stabilné."
  },
  {
    id: 5,
    category: "Minerálna voda",
    icon: "💧",
    text: "Niektoré vody putujú pod zemou desiatky až stovky rokov."
  },
  {
    id: 6,
    category: "Minerálna voda",
    icon: "💧",
    text: "Každý prameň má jedinečné minerálne zloženie."
  },
  {
    id: 7,
    category: "Minerálna voda",
    icon: "💧",
    text: "Chuť vody ovplyvňuje obsah minerálov a CO₂."
  },
  {
    id: 8,
    category: "Minerálna voda",
    icon: "💧",
    text: "Vápnik je jeden z najčastejších minerálov vo vode."
  }
];

let index = 0;

function showFact(i) {
  const fact = facts[i];

  const category = document.getElementById("category");
  const icon = document.getElementById("icon");
  const text = document.getElementById("text");

  // fade out
  text.classList.add("fade");

  setTimeout(() => {
    category.textContent = fact.category;
    icon.textContent = fact.icon;
    text.textContent = fact.text;

    text.classList.remove("fade");
  }, 300);
}

// inicializácia
showFact(index);

// rotácia každých 5 sekúnd
setInterval(() => {
  index = (index + 1) % facts.length;
  showFact(index);
}, 5000);
</script>

</body>
</html>
