// ===== stabilný výber 2 faktov na deň =====
function getDailyFacts() {
  const now = new Date();

  const start = new Date(now.getFullYear(), 0, 1);

  // každý 12-hodinový blok má svoje číslo
  const halfDayIndex = Math.floor(
    (now - start) / (1000 * 60 * 60 * 12)
  );

  // prvý fakt v poradí
  let i1 = (halfDayIndex * 2) % facts.length;

  // druhý fakt hľadáme tak, aby bol inej kategórie
  let i2 = (i1 + 1) % facts.length;

  while (facts[i2].category === facts[i1].category) {
    i2++;

    if (i2 >= facts.length) {
      i2 = 0;
    }
  }

  return [facts[i1], facts[i2]];
}
  
// ===== zobrazenie =====
function render() {
  const result = getDailyFacts();

  const f1 = result[0];
  const f2 = result[1];

  document.getElementById("cat1").textContent = f1.category;
  document.getElementById("icon1").textContent = f1.icon;
  document.getElementById("text1").textContent = f1.text;

  document.getElementById("cat2").textContent = f2.category;
  document.getElementById("icon2").textContent = f2.icon;
  document.getElementById("text2").textContent = f2.text;
}

render();
  
  setInterval(() => {
  render();
}, 60000);
