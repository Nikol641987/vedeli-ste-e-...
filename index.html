// ===== stabilný výber 2 faktov na deň =====
function getDailyFacts() {
  const day = Math.floor(Date.now() / 86400000);

  const i1 = day % facts.length;
  let i2 = (day * 7) % facts.length;

  if (i1 === i2) i2 = (i2 + 1) % facts.length;

  return [facts[i1], facts[i2]];
}

// ===== zobrazenie =====
function render() {
  const [f1, f2] = getDailyFacts();

  document.getElementById("cat1").innerHTML =
    `<span style="color:#d62828;">${f1.category}</span>`;
  document.getElementById("icon1").textContent = f1.icon;
  document.getElementById("text1").textContent = f1.text;

  document.getElementById("cat2").innerHTML =
    `<span style="color:#d62828;">${f2.category}</span>`;
  document.getElementById("icon2").textContent = f2.icon;
  document.getElementById("text2").textContent = f2.text;
}

render();

</script>
